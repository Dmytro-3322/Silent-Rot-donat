<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Silent Rot</title>
    <style>
        body {
            margin: 0;
            background: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            margin-top: 15%;
        }

        h1 {
            font-size: 50px;
            letter-spacing: 3px;
        }

        p {
            font-size: 18px;
            color: #aaa;
        }

        .btn {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 18px;
            background: #ff3c3c;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff1a1a;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Silent Rot</h1>
    <p>поддержите меня донатом ❤️</p>

    <a class="btn" href="" target="_blank">
        💸 поддержать
    </a>
</div>

</body>
</html>
